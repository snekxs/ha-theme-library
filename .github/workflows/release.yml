name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip integration
        run: |
          cd custom_components/theme_library
          zip -r "${{ github.workspace }}/theme_library.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: theme_library.zip
          generate_release_notes: true
