<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Light Theme Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Light Theme Library</h1>
    <button id="create-btn" class="btn btn-primary">+ New</button>
  </header>

  <div id="running-banner" class="running-banner hidden">
    <span id="running-text"></span>
    <button id="running-stop" class="btn btn-icon">Stop</button>
  </div>

  <section id="controls-bar" class="controls-bar collapsed">
    <button id="controls-toggle" class="controls-bar-header" aria-expanded="false">
      <span>Controls</span>
      <span id="controls-summary" class="muted"></span>
      <span id="controls-chevron" class="chevron">&#9662;</span>
    </button>
    <div id="controls-body">
      <div class="control-block">
        <div class="control-row">
          <span class="control-label">Target Lights</span>
          <span id="target-count" class="muted"></span>
        </div>
        <p class="muted small">Themes and effects apply to whatever's checked here.</p>
        <div id="target-lights" class="light-list light-list-horizontal"></div>
      </div>

      <div class="control-block">
        <div class="control-row">
          <label class="switch-row">
            <input type="checkbox" id="dynamic-toggle" />
            <span class="switch"></span>
            <span>Dynamic Mode</span>
          </label>
          <label class="speed-row">
            Speed
            <input type="number" id="dynamic-interval" min="2" max="120" step="1" value="8" />
            <span class="muted small">sec</span>
          </label>
        </div>
        <p class="muted small">When on, applying a theme slowly cycles its colors instead of setting them once.</p>
      </div>
    </div>
  </section>

  <div class="tabs">
    <button class="tab active" data-tab="themes">Themes</button>
    <button class="tab" data-tab="effects">Effects</button>
  </div>

  <div id="category-filters" class="category-filters"></div>

  <main id="grid" class="grid"></main>

  <div id="create-modal" class="modal hidden">
    <div class="modal-card">
      <h2>Create theme from current lights</h2>
      <label>Name<input id="create-name" type="text" placeholder="e.g. Cozy Weekend" /></label>
      <label>Description<input id="create-desc" type="text" placeholder="optional" /></label>
      <label>Category<input id="create-category" type="text" placeholder="e.g. Relax & Unwind" list="category-options" /></label>
      <datalist id="category-options"></datalist>
      <label>Tags (comma separated)<input id="create-tags" type="text" placeholder="evening, warm" /></label>
      <p class="muted">Pick the lights whose current color/brightness should be captured:</p>
      <div id="create-lights" class="light-list"></div>
      <div class="modal-actions">
        <button class="btn" data-close="create-modal">Cancel</button>
        <button id="create-confirm" class="btn btn-primary">Capture &amp; Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
